<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certo | Genuine Apple Products, Delivered to Nigeria</title>
  <meta name="description" content="Buy genuine Apple products directly sourced from Apple US. Serial verified, warranty intact, delivered to your door in Nigeria." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Open Graph / Link Preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://certo.ng/" />
  <meta property="og:title"       content="Certo | Genuine Apple Products, Delivered to Nigeria" />
  <meta property="og:description" content="Buy genuine Apple products directly sourced from Apple US. Serial verified, warranty intact, delivered to your door in Nigeria." />
  <meta property="og:image"       content="https://certo.ng/logo.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Certo | Genuine Apple Products, Delivered to Nigeria" />
  <meta name="twitter:description" content="Buy genuine Apple products directly sourced from Apple US. Serial verified, warranty intact, delivered to your door in Nigeria." />
  <meta name="twitter:image"       content="https://certo.ng/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #faf9f7;
      --bg-alt:      #f2f0ec;
      --text:        #1a1714;
      --text-muted:  #706b60;
      --accent:      #d97757;
      --accent-tint: #fdf0eb;
      --accent-tint2:#f5d9cc;
      --accent-shadow: rgba(217,119,87,0.28);
      --border:      #e5e2db;
      --border-light:#ede9e2;
      --font-head:   'Syne', sans-serif;
      --font-body:   'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Path → hash redirect: handles clean URLs from emails and social shares -->
  <script>
    (function() {
      var path = window.location.pathname;
      // /track/CRT-XXXX  (order email links)
      var tm = path.match(/^\/track\/([A-Z0-9\-]+)$/i);
      if (tm) { window.location.replace('/#/track/' + encodeURIComponent(tm[1].toUpperCase())); return; }
      // /product/:id  (social share links — server already served OG tags, now load the SPA)
      var pm = path.match(/^\/product\/(.+)$/);
      if (pm) { window.location.replace('/#/product/' + encodeURIComponent(pm[1])); }
    })();
  </script>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (JSX transpiler) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 1. Shared data & constants (loaded first — everything else depends on these) -->
  <script type="text/babel" src="src/data.js"></script>

  <!-- 2. Utility: Tweaks panel -->
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>

  <!-- 3. Shared components -->
  <script type="text/babel" src="src/components/Nav.jsx"></script>

  <!-- 4. Pages (loaded after data.js so PRODUCTS / CERTO_RATE are available) -->
  <script type="text/babel" src="src/pages/HomePage.jsx"></script>
  <script type="text/babel" src="src/pages/ShopPage.jsx"></script>
  <script type="text/babel" src="src/pages/Pages.jsx"></script>
  <script type="text/babel" src="src/pages/Checkout.jsx"></script>
  <script type="text/babel" src="src/pages/dashboard/DashboardPage.jsx"></script>

  <!-- 5. App shell (router + state — loaded last) -->
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
